global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: postgres
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ["minio:9000"]

  - job_name: minio_bucket
    metrics_path: /minio/v2/metrics/bucket
    static_configs:
      - targets: ["minio:9000"]

  - job_name: backup
    static_configs:
      - targets: ["backup:9091"]

  - job_name: patroni1
    static_configs:
      - targets: ["patroni1:8008"]

  - job_name: patroni2
    static_configs:
      - targets: ["patroni2:8008"]

  - job_name: etcd
    static_configs:
      - targets: ["etcd:2379"]
