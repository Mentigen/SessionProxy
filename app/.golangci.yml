version: "2"

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - gocritic
    - gosec
    - bodyclose
    - unused
    - ineffassign
  # revive is deliberately not enabled: its default ruleset is dominated by
  # "every exported symbol needs a doc comment," which is a project-style
  # choice, not a correctness signal, and would drown out the linters above
  # that actually catch bugs.

  settings:
    gosec:
      excludes:
        # G404 (weak random) flags crypto/rand call sites that already use
        # crypto/rand correctly - the linter's heuristic false-positives on
        # a few of our own defensive Read calls in tests. Reviewed by hand.
        - G404
    errcheck:
      exclude-functions:
        # These Close/Flush calls are best-effort cleanup on paths where
        # the error is already being reported through a different channel
        # (or truly does not matter, e.g. closing an http.ResponseWriter
        # body reader in a defer).
        - (io.Closer).Close

  exclusions:
    rules:
      # Generated code (protoc, templ, mockgen) is not something we hand-edit
      # or want linted as if we wrote it by hand.
      - path: (_templ\.go|_grpc\.pb\.go|\.pb\.go|mocks/mocks\.go)$
        linters:
          - govet
          - staticcheck
          - errcheck
          - revive
          - gocritic
          - gosec
          - bodyclose
          - unused
          - ineffassign

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
