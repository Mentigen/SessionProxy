name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: app/go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12.2
          working-directory: app

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: app/go.sum
      - name: Unit tests
        run: go test $(go list ./... | grep -v /test/integration) -race -cover
      - name: Integration tests (testcontainers-go)
        run: go test ./test/integration/... -v -timeout 300s

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build app image
        run: docker build -t sessionproxy-app:${{ github.sha }} ./app
