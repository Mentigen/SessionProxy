services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    build:
      context: .
      dockerfile: migrate/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      TEST_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${TEST_POSTGRES_DB}?sslmode=disable
      MIGRATION_VERSION: ${MIGRATION_VERSION:-}
      POSTGRES_EXPORTER_USER: ${POSTGRES_EXPORTER_USER:-exporter}
      POSTGRES_EXPORTER_PASSWORD: ${POSTGRES_EXPORTER_PASSWORD:-exporter_secret}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  seeder:
    build:
      context: .
      dockerfile: seeder/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      migrate:
        condition: service_completed_successfully
    profiles:
      - seed

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_EXPORTER_USER:-exporter}:${POSTGRES_EXPORTER_PASSWORD:-exporter_secret}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      migrate:
        condition: service_completed_successfully
    profiles:
      - monitoring

  prometheus:
    image: prom/prometheus:v2.51.2
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - postgres_exporter
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.4.2
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    profiles:
      - monitoring

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    profiles:
      - backup

  backup:
    build:
      context: .
      dockerfile: backup/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      BUCKET_BACKUP_NAME: ${BUCKET_BACKUP_NAME:-pg-backups}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-0 2 * * *}
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-7}
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    profiles:
      - backup

  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.17
    command:
      - etcd
      - --name=etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=etcd=http://etcd:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=sessionproxy-etcd
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    profiles:
      - ha

  patroni1:
    build:
      context: .
      dockerfile: ha/Dockerfile
    env_file: .env
    environment:
      PATRONI_NAME: patroni1
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
      PATRONI_SUPERUSER_PASSWORD: ${PATRONI_SUPERUSER_PASSWORD}
    volumes:
      - ./data/patroni1:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8008/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    depends_on:
      etcd:
        condition: service_healthy
    profiles:
      - ha

  patroni2:
    build:
      context: .
      dockerfile: ha/Dockerfile
    env_file: .env
    environment:
      PATRONI_NAME: patroni2
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
      PATRONI_SUPERUSER_PASSWORD: ${PATRONI_SUPERUSER_PASSWORD}
    volumes:
      - ./data/patroni2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8008/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    depends_on:
      etcd:
        condition: service_healthy
      patroni1:
        condition: service_healthy
    profiles:
      - ha

  haproxy:
    image: haproxy:2.8-alpine
    volumes:
      - ./ha/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "${HA_PORT:-5433}:5432"
      - "${HA_STATS_PORT:-7000}:7000"
    depends_on:
      patroni1:
        condition: service_healthy
      patroni2:
        condition: service_healthy
    profiles:
      - ha

  migrate-ha:
    build:
      context: .
      dockerfile: migrate/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@haproxy:5432/${POSTGRES_DB}?sslmode=disable
      TEST_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@haproxy:5432/${TEST_POSTGRES_DB}?sslmode=disable
      MIGRATION_VERSION: ${MIGRATION_VERSION:-}
      POSTGRES_EXPORTER_USER: ${POSTGRES_EXPORTER_USER:-exporter}
      POSTGRES_EXPORTER_PASSWORD: ${POSTGRES_EXPORTER_PASSWORD:-exporter_secret}
      PG_HOST: haproxy
    depends_on:
      haproxy:
        condition: service_started
    restart: on-failure
    profiles:
      - ha
